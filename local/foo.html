<html>
  <head>
    <style>

      #container {
          border: 30px solid darkgrey;
          background-color: lightgrey;
          position: absolute;
          left: 100px;
          top: 100px;
          height: 100px;
          width: auto;
          aspect-ratio: 1.155;
          display: grid;
      }

      #box {
          background-color: yellow;

          border-radius:50%;
          box-shadow: 0 0 0 3px #e78267;

          height: 100%;
          width: calc(100% / 1.155); /* 86.58 */
          margin-left: 6.7%;
          display: grid;
          justify-content: center;
          align-items: center;
      }


    </style>
  </head>
  <body>
    <div id="container">
      <div id="box">x</div>
    </div>
  </body>
</html>
